<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ham-cw</title>
<style>
:root {
  --bg:        #0d1117;
  --surface:   #161b22;
  --border:    #30363d;
  --fg:        #c9d1d9;
  --fg-dim:    #8b949e;
  --accent:    #58a6ff;
  --green:     #3fb950;
  --red:       #f85149;
  --orange:    #d29922;
  --yellow:    #e3b341;
  --radius:    10px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--fg);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px;
}

/* ---- Header ---- */
header {
  width: 100%;
  max-width: 520px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
header h1 { font-size: 1.4rem; font-weight: 700; color: var(--fg); }
header h1 span { color: var(--accent); }

/* ---- Cards ---- */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  width: 100%;
  max-width: 520px;
  padding: 16px;
  margin-bottom: 12px;
}
.card-title {
  font-size: 0.75rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--fg-dim);
  margin-bottom: 12px;
}

/* ---- Status bar ---- */
.status-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
}
.pill {
  display: inline-flex;
  align-items: center;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 0.82rem;
  font-weight: 600;
  background: #21262d;
  color: var(--fg-dim);
  transition: background 0.15s, color 0.15s;
}
.pill.active      { background: var(--green);  color: #000; }
.pill.key-on      { background: var(--yellow); color: #000; }
.pill.sending     { background: var(--orange); color: #000; }
.pill-mode        { background: var(--accent); color: #000; }

/* ---- Parameter controls ---- */
.param-row {
  display: flex;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
}
.param-row:last-child { border-bottom: none; }
.param-label {
  width: 72px;
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--fg-dim);
}
.param-value {
  flex: 1;
  text-align: center;
  font-size: 1.5rem;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
}
.param-unit {
  width: 32px;
  font-size: 0.8rem;
  color: var(--fg-dim);
}
.btn-adj {
  width: 48px;
  height: 48px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: #21262d;
  color: var(--fg);
  font-size: 1.4rem;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.12s;
}
.btn-adj:active { background: var(--accent); color: #000; }

/* ---- Text input ---- */
.text-group { display: flex; gap: 8px; }
.text-group input {
  flex: 1;
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: #0d1117;
  color: var(--fg);
  font-size: 1rem;
  outline: none;
}
.text-group input:focus { border-color: var(--accent); }
.btn {
  padding: 10px 18px;
  border: none;
  border-radius: 8px;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.12s;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.btn:active { opacity: 0.7; }
.btn-send { background: var(--green);  color: #000; }
.btn-stop { background: var(--red);    color: #fff; }
.btn-test { background: #30363d;       color: var(--fg); }

.action-row { display: flex; gap: 8px; margin-top: 8px; }

/* ---- Settings ---- */
.settings-toggle {
  background: none;
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--fg-dim);
  padding: 6px 14px;
  font-size: 0.82rem;
  cursor: pointer;
}
.settings-toggle:hover { color: var(--fg); border-color: var(--fg-dim); }

.settings-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.setting-item label {
  display: block;
  font-size: 0.75rem;
  color: var(--fg-dim);
  margin-bottom: 4px;
}
.setting-item select,
.setting-item input[type="number"] {
  width: 100%;
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: #0d1117;
  color: var(--fg);
  font-size: 0.9rem;
  outline: none;
}
.setting-item select:focus,
.setting-item input[type="number"]:focus { border-color: var(--accent); }

.btn-save {
  margin-top: 12px;
  width: 100%;
  padding: 10px;
  background: var(--accent);
  color: #000;
  font-weight: 600;
}

/* Detect */
.detect-btn {
  margin-top: 10px;
  background: #30363d;
  color: var(--fg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 16px;
  font-size: 0.85rem;
  cursor: pointer;
  width: 100%;
}
.detect-btn:active { background: var(--accent); color: #000; }
.detect-result {
  margin-top: 8px;
  font-size: 0.85rem;
  color: var(--fg-dim);
  min-height: 1.2em;
}

/* Hidden */
.hidden { display: none !important; }

/* Responsive */
@media (max-width: 360px) {
  body { padding: 8px; }
  .param-value { font-size: 1.2rem; }
  .btn-adj { width: 40px; height: 40px; font-size: 1.1rem; }
}
</style>
</head>
<body>

<!-- Header -->
<header>
  <h1><span>ham</span>-cw</h1>
  <button class="settings-toggle" onclick="toggleSettings()">Settings</button>
</header>

<!-- Status -->
<div class="card">
  <div class="status-row">
    <span class="pill pill-mode" id="pill-mode">TX</span>
    <span class="pill" id="pill-dit">DIT</span>
    <span class="pill" id="pill-dah">DAH</span>
    <span class="pill" id="pill-key">KEY</span>
    <span class="pill" id="pill-sending">SENDING</span>
  </div>
</div>

<!-- Parameters -->
<div class="card">
  <div class="card-title">Parameters</div>
  <div id="params"></div>
</div>

<!-- Transmit -->
<div class="card">
  <div class="card-title">Transmit</div>
  <div class="text-group">
    <input type="text" id="tx-text" placeholder="CW text..." autocomplete="off" spellcheck="false">
    <button class="btn btn-send" onclick="sendText()">Send</button>
  </div>
  <div class="action-row">
    <button class="btn btn-stop" onclick="stopSend()">Stop</button>
    <button class="btn btn-test" onclick="testTone()">Test Tone</button>
  </div>
</div>

<!-- Settings (hidden by default) -->
<div class="card hidden" id="settings-card">
  <div class="card-title">Settings</div>
  <div class="settings-grid">
    <div class="setting-item">
      <label>Freq Step (Hz)</label>
      <select id="set-freq-step">
        <option value="1">1</option>
        <option value="5">5</option>
        <option value="10">10</option>
        <option value="15">15</option>
        <option value="25">25</option>
        <option value="50">50</option>
        <option value="100">100</option>
      </select>
    </div>
    <div class="setting-item">
      <label>WPM Step</label>
      <select id="set-wpm-step">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="5">5</option>
      </select>
    </div>
    <div class="setting-item">
      <label>Volume Step</label>
      <select id="set-volume-step">
        <option value="1">1</option>
        <option value="5">5</option>
        <option value="10">10</option>
        <option value="25">25</option>
      </select>
    </div>
  </div>

  <div style="margin-top: 16px;">
    <div class="card-title">GPIO Pins</div>
    <div class="settings-grid" id="pin-grid"></div>
  </div>

  <button class="btn btn-save" onclick="saveSettings()">Save Settings</button>

  <button class="detect-btn" onclick="detectPins()">Detect Active Pins</button>
  <div class="detect-result" id="detect-result"></div>
</div>

<script>
/* ================================================================
   ham-cw web UI
   ================================================================ */

const PARAMS = [
  { key: 'wpm',    label: 'WPM',    unit: '' },
  { key: 'freq',   label: 'Freq',   unit: 'Hz' },
  { key: 'volume', label: 'Vol',    unit: '%' },
];

const PIN_KEYS = [
  'pin_dit', 'pin_dah', 'pin_spk', 'pin_spk_gnd',
  'pin_ptt', 'pin_mode', 'pin_sel', 'pin_adj_up', 'pin_adj_down',
];

let cfg = {};

/* ---- Build param rows ---- */
function buildParams() {
  const container = document.getElementById('params');
  PARAMS.forEach(p => {
    const row = document.createElement('div');
    row.className = 'param-row';
    row.innerHTML = `
      <button class="btn-adj" data-param="${p.key}" data-dir="-1">&minus;</button>
      <span class="param-label">${p.label}</span>
      <span class="param-value" id="val-${p.key}">--</span>
      <span class="param-unit">${p.unit}</span>
      <button class="btn-adj" data-param="${p.key}" data-dir="1">+</button>`;
    container.appendChild(row);
  });
  container.querySelectorAll('.btn-adj').forEach(btn => {
    btn.addEventListener('click', () => {
      adjust(btn.dataset.param, parseInt(btn.dataset.dir));
    });
  });
}

/* ---- Build pin settings ---- */
function buildPinGrid() {
  const grid = document.getElementById('pin-grid');
  PIN_KEYS.forEach(key => {
    const nice = key.replace('pin_', '').replace(/_/g, ' ');
    const item = document.createElement('div');
    item.className = 'setting-item';
    item.innerHTML = `<label>${nice}</label>
      <input type="number" id="set-${key}" min="0" max="27" value="0">`;
    grid.appendChild(item);
  });
}

/* ---- API helpers ---- */
async function api(method, path, body) {
  const opts = { method };
  if (body !== undefined) {
    opts.headers = { 'Content-Type': 'application/json' };
    opts.body = JSON.stringify(body);
  }
  const r = await fetch(path, opts);
  return r.json();
}

async function adjust(param, dir) {
  const data = await api('POST', '/api/adjust', { param, direction: dir });
  if (data.value !== undefined) {
    document.getElementById('val-' + param).textContent = data.value;
  }
}

function sendText() {
  const input = document.getElementById('tx-text');
  const text = input.value.trim();
  if (text) api('POST', '/api/send', { text });
}

function stopSend() { api('POST', '/api/stop'); }
function testTone() { api('POST', '/api/test'); }

/* ---- Settings ---- */
function toggleSettings() {
  document.getElementById('settings-card').classList.toggle('hidden');
}

async function loadConfig() {
  cfg = await api('GET', '/api/config');

  document.getElementById('set-freq-step').value   = cfg.freq_step   || 50;
  document.getElementById('set-wpm-step').value     = cfg.wpm_step    || 1;
  document.getElementById('set-volume-step').value  = cfg.volume_step || 5;

  PIN_KEYS.forEach(key => {
    const el = document.getElementById('set-' + key);
    if (el) el.value = cfg[key] || 0;
  });
}

async function saveSettings() {
  const updates = {
    freq_step:   parseInt(document.getElementById('set-freq-step').value),
    wpm_step:    parseInt(document.getElementById('set-wpm-step').value),
    volume_step: parseInt(document.getElementById('set-volume-step').value),
  };
  PIN_KEYS.forEach(key => {
    const el = document.getElementById('set-' + key);
    if (el) updates[key] = parseInt(el.value);
  });
  await api('POST', '/api/config', updates);
  cfg = await api('GET', '/api/config');
}

async function detectPins() {
  const el = document.getElementById('detect-result');
  el.textContent = 'Scanning...';
  const data = await api('GET', '/api/scan');
  if (data.active && data.active.length) {
    el.textContent = 'Active (LOW): GPIO ' + data.active.join(', ');
  } else {
    el.textContent = 'No pins pulled LOW.';
  }
}

/* ---- Status polling ---- */
async function poll() {
  try {
    const [status, config] = await Promise.all([
      api('GET', '/api/status'),
      api('GET', '/api/config'),
    ]);

    // Mode pill
    const modePill = document.getElementById('pill-mode');
    modePill.textContent = (status.mode || 'tx').toUpperCase();

    // Indicator pills
    setPill('pill-dit',     status.dit,      'active');
    setPill('pill-dah',     status.dah,      'active');
    setPill('pill-key',     status.key_down, 'key-on');
    setPill('pill-sending', status.sending,  'sending');

    // Param values
    document.getElementById('val-wpm').textContent    = config.wpm;
    document.getElementById('val-freq').textContent   = config.freq;
    document.getElementById('val-volume').textContent = config.volume;
  } catch (e) { /* ignore fetch errors */ }
}

function setPill(id, active, cls) {
  const el = document.getElementById(id);
  if (active) el.classList.add(cls);
  else        el.classList.remove(cls);
}

/* ---- Enter key sends ---- */
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.activeElement.id === 'tx-text') {
    sendText();
  }
});

/* ---- Init ---- */
buildParams();
buildPinGrid();
loadConfig();
poll();
setInterval(poll, 200);
</script>
</body>
</html>
